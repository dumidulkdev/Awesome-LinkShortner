{% extends "base.html" %}

{% block title %}Dashboard &mdash; LinkShort{% endblock %}

{% block content %}
<div class="space-y-10">
    <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold tracking-tight">Your links</h1>
        <button onclick="openCreateModal()" class="border border-neutral-900 px-4 py-2 text-sm font-medium hover:bg-neutral-900 hover:text-white transition-colors">
            New link
        </button>
    </div>

    <div id="create-modal" class="hidden border border-neutral-200 p-6">
        <h3 class="text-sm font-semibold mb-5">Create short link</h3>
        <div class="space-y-4">
            <div>
                <label class="block text-xs text-neutral-500 uppercase tracking-wider mb-2">URL</label>
                <input type="url" id="new-url" placeholder="https://example.com/your-long-url" class="w-full px-4 py-3 border border-neutral-300 text-sm font-mono placeholder-neutral-400 focus:border-neutral-900 transition-colors">
            </div>
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs text-neutral-500 uppercase tracking-wider mb-2">Custom code</label>
                    <input type="text" id="new-custom-code" placeholder="optional" class="w-full px-4 py-3 border border-neutral-300 text-sm font-mono placeholder-neutral-400 focus:border-neutral-900 transition-colors">
                </div>
                <div>
                    <label class="block text-xs text-neutral-500 uppercase tracking-wider mb-2">Title</label>
                    <input type="text" id="new-title" placeholder="optional" class="w-full px-4 py-3 border border-neutral-300 text-sm placeholder-neutral-400 focus:border-neutral-900 transition-colors">
                </div>
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="createLink()" class="px-5 py-2 bg-neutral-900 text-white text-sm font-medium hover:bg-neutral-700 transition-colors">Create</button>
                <button onclick="closeCreateModal()" class="px-5 py-2 text-sm text-neutral-500 hover:text-neutral-900 transition-colors">Cancel</button>
            </div>
        </div>
        <div id="create-error" class="hidden mt-4 text-sm text-red-600"></div>
    </div>

    <div id="links-loading" class="text-sm text-neutral-400 py-16 text-center">Loading...</div>

    <div id="links-empty" class="hidden py-16 text-center">
        <p class="text-neutral-400 text-sm">No links yet. Create your first one.</p>
    </div>

    <div id="links-table" class="hidden">
        <table class="w-full text-sm">
            <thead>
                <tr class="border-b border-neutral-200 text-neutral-500 text-xs uppercase tracking-wider">
                    <th class="text-left py-3 font-medium">Code</th>
                    <th class="text-left py-3 font-medium">Destination</th>
                    <th class="text-left py-3 font-medium">Clicks</th>
                    <th class="text-left py-3 font-medium">Created</th>
                    <th class="text-right py-3 font-medium"></th>
                </tr>
            </thead>
            <tbody id="links-body"></tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const token = getToken();
    if (!token) window.location.href = '/login';

    loadLinks();

    async function loadLinks() {
        try {
            const res = await fetch('/api/links', {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                localStorage.removeItem('token');
                window.location.href = '/login';
                return;
            }

            const links = await res.json();
            document.getElementById('links-loading').classList.add('hidden');

            if (links.length === 0) {
                document.getElementById('links-empty').classList.remove('hidden');
                return;
            }

            document.getElementById('links-table').classList.remove('hidden');
            const tbody = document.getElementById('links-body');
            tbody.innerHTML = links.map(link => `
                <tr class="border-b border-neutral-100 group">
                    <td class="py-4">
                        <a href="/${link.short_code}" target="_blank" class="font-mono text-neutral-900 hover:underline underline-offset-4">${link.short_code}</a>
                    </td>
                    <td class="py-4 text-neutral-500 max-w-xs truncate pr-6">${link.original_url}</td>
                    <td class="py-4">
                        <a href="/stats/${link.id}" class="text-neutral-900 hover:underline underline-offset-4 tabular-nums">${link.click_count}</a>
                    </td>
                    <td class="py-4 text-neutral-400 tabular-nums">${new Date(link.created_at).toLocaleDateString()}</td>
                    <td class="py-4 text-right">
                        <span class="opacity-0 group-hover:opacity-100 transition-opacity flex gap-3 justify-end">
                            <button onclick="copyLink('${link.short_url}')" class="text-xs text-neutral-500 hover:text-neutral-900 transition-colors">copy</button>
                            <button onclick="deleteLink('${link.id}')" class="text-xs text-red-500 hover:text-red-700 transition-colors">delete</button>
                        </span>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            document.getElementById('links-loading').textContent = 'Failed to load links.';
        }
    }

    function openCreateModal() {
        document.getElementById('create-modal').classList.remove('hidden');
    }

    function closeCreateModal() {
        document.getElementById('create-modal').classList.add('hidden');
        document.getElementById('create-error').classList.add('hidden');
    }

    async function createLink() {
        const url = document.getElementById('new-url').value.trim();
        const customCode = document.getElementById('new-custom-code').value.trim();
        const title = document.getElementById('new-title').value.trim();
        const errorDiv = document.getElementById('create-error');
        errorDiv.classList.add('hidden');

        const body = { url };
        if (customCode) body.custom_code = customCode;
        if (title) body.title = title;

        try {
            const res = await fetch('/api/links', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(body)
            });

            const data = await res.json();

            if (!res.ok) {
                errorDiv.textContent = data.error;
                errorDiv.classList.remove('hidden');
                return;
            }

            closeCreateModal();
            document.getElementById('new-url').value = '';
            document.getElementById('new-custom-code').value = '';
            document.getElementById('new-title').value = '';
            loadLinks();
        } catch (e) {
            errorDiv.textContent = 'Network error.';
            errorDiv.classList.remove('hidden');
        }
    }

    async function deleteLink(id) {
        if (!confirm('Delete this link?')) return;

        await fetch(`/api/links/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });

        loadLinks();
    }

    function copyLink(url) {
        navigator.clipboard.writeText(url);
    }
</script>
{% endblock %}
