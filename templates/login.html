{% extends "base.html" %}

{% block title %}Login &mdash; LinkShort{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-10 sm:mt-20">
    <h2 class="text-2xl font-bold tracking-tight mb-8">Log in</h2>

    <div id="error" class="hidden mb-6 text-sm text-red-600"></div>

    <div class="space-y-5">
        <div>
            <label class="block text-xs text-neutral-500 uppercase tracking-wider mb-2">Email</label>
            <input type="email" id="email" class="w-full px-4 py-3 border border-neutral-300 text-sm focus:border-neutral-900 transition-colors">
        </div>
        <div>
            <label class="block text-xs text-neutral-500 uppercase tracking-wider mb-2">Password</label>
            <input type="password" id="password" class="w-full px-4 py-3 border border-neutral-300 text-sm focus:border-neutral-900 transition-colors">
        </div>
        <button onclick="login()" class="w-full py-3 bg-neutral-900 text-white text-sm font-medium hover:bg-neutral-700 transition-colors">
            Log in
        </button>
    </div>

    <p class="mt-6 text-sm text-neutral-500">
        No account? <a href="/register" class="text-neutral-900 underline underline-offset-4">Sign up</a>
    </p>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error');
        errorDiv.classList.add('hidden');

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                errorDiv.textContent = data.error || 'Login failed.';
                errorDiv.classList.remove('hidden');
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('email', data.email);
            window.location.href = '/dashboard';
        } catch (e) {
            errorDiv.textContent = 'Network error.';
            errorDiv.classList.remove('hidden');
        }
    }
</script>
{% endblock %}
