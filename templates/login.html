{% extends "base.html" %}

{% block title %}Log in &mdash; LinkShort{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto py-8 sm:py-14">
    <span class="label-sm mb-6 block">AUTHENTICATION</span>
    <h1 class="text-3xl sm:text-4xl font-bold tracking-tight text-ink mb-2">Log in</h1>
    <p class="text-mute text-sm mb-10">Access your links and analytics.</p>

    <div id="error" class="hidden border-2 border-accent bg-accent/5 px-5 py-4 mb-6 text-sm font-medium text-accent"></div>

    <div class="border-2 border-ink bg-paper">
        <div class="p-6 sm:p-8 space-y-6">
            <div>
                <label class="label-sm mb-2 block">Email</label>
                <input type="email" id="email" placeholder="you@example.com" class="input-line w-full px-4 py-3.5 text-sm">
            </div>
            <div>
                <label class="label-sm mb-2 block">Password</label>
                <input type="password" id="password" placeholder="Your password" class="input-line w-full px-4 py-3.5 text-sm">
            </div>
            <button onclick="login()" class="btn-solid w-full py-3.5 text-sm">
                SIGN IN
            </button>
        </div>
        <div class="border-t-2 border-ink bg-surface px-6 sm:px-8 py-5 text-center">
            <p class="text-sm text-mute">
                No account?
                <a href="/register" class="text-ink font-bold underline underline-offset-4 hover:text-accent transition-colors ml-1">Create one</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function login() {
        var email = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;
        var errorDiv = document.getElementById('error');
        errorDiv.classList.add('hidden');

        if (!email || !password) {
            errorDiv.textContent = 'Fill in both fields.';
            errorDiv.classList.remove('hidden');
            return;
        }

        try {
            var res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            });

            var data = await res.json();

            if (!res.ok) {
                errorDiv.textContent = data.error || 'Login failed.';
                errorDiv.classList.remove('hidden');
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('email', data.email);
            window.location.href = '/dashboard';
        } catch (e) {
            errorDiv.textContent = 'Network error. Try again.';
            errorDiv.classList.remove('hidden');
        }
    }

    document.getElementById('password').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });
    document.getElementById('email').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });
</script>
{% endblock %}
