{% extends "base.html" %}

{% block title %}Login - LinkShort{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md bg-gray-900 rounded-2xl p-8 border border-gray-800">
        <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

        <div id="error" class="hidden mb-4 p-3 bg-red-900/30 border border-red-800 rounded-lg text-red-400 text-sm"></div>

        <div class="space-y-4">
            <div>
                <label class="block text-sm text-gray-400 mb-1">Email</label>
                <input type="email" id="email" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-primary">
            </div>
            <div>
                <label class="block text-sm text-gray-400 mb-1">Password</label>
                <input type="password" id="password" class="w-full px-4 py-3 bg-gray-800 border border-gray-700 rounded-lg text-white focus:outline-none focus:border-primary">
            </div>
            <button onclick="login()" class="w-full py-3 bg-primary text-white font-semibold rounded-lg hover:bg-indigo-600 transition">
                Login
            </button>
        </div>

        <p class="mt-4 text-center text-gray-400 text-sm">
            Don't have an account? <a href="/register" class="text-primary hover:underline">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error');
        errorDiv.classList.add('hidden');

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                errorDiv.textContent = data.error || 'Login failed';
                errorDiv.classList.remove('hidden');
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('email', data.email);
            window.location.href = '/dashboard';
        } catch (e) {
            errorDiv.textContent = 'Network error';
            errorDiv.classList.remove('hidden');
        }
    }
</script>
{% endblock %}
