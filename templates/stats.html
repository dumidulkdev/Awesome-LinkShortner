{% extends "base.html" %}

{% block title %}Stats - LinkShort{% endblock %}

{% block content %}
<div class="space-y-8">
    <div class="flex items-center gap-4">
        <a href="/dashboard" class="text-gray-400 hover:text-white">&larr; Back</a>
        <h1 class="text-3xl font-bold">Link Analytics</h1>
    </div>

    <div id="stats-loading" class="text-center text-gray-400 py-12">Loading stats...</div>

    <div id="stats-content" class="hidden space-y-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
                <p class="text-gray-400 text-sm">Total Clicks</p>
                <p id="total-clicks" class="text-4xl font-bold text-primary mt-2">0</p>
            </div>
            <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
                <p class="text-gray-400 text-sm">Today</p>
                <p id="today-clicks" class="text-4xl font-bold text-green-400 mt-2">0</p>
            </div>
            <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
                <p class="text-gray-400 text-sm">Last 7 Days</p>
                <p id="week-clicks" class="text-4xl font-bold text-blue-400 mt-2">0</p>
            </div>
        </div>

        <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
            <h3 class="text-xl font-semibold mb-4">Recent Clicks</h3>
            <div id="clicks-empty" class="hidden text-gray-400 py-4">No clicks yet</div>
            <div id="clicks-table" class="hidden overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b border-gray-800 text-gray-400 text-sm">
                            <th class="text-left px-4 py-3">Time</th>
                            <th class="text-left px-4 py-3">IP Address</th>
                            <th class="text-left px-4 py-3">Referrer</th>
                            <th class="text-left px-4 py-3">User Agent</th>
                        </tr>
                    </thead>
                    <tbody id="clicks-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/login';

    const linkId = window.location.pathname.split('/').pop();
    loadStats();

    async function loadStats() {
        try {
            const res = await fetch(`/api/links/${linkId}/stats`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.status === 401) {
                window.location.href = '/login';
                return;
            }

            const stats = await res.json();
            document.getElementById('stats-loading').classList.add('hidden');
            document.getElementById('stats-content').classList.remove('hidden');

            document.getElementById('total-clicks').textContent = stats.total_clicks;
            document.getElementById('today-clicks').textContent = stats.clicks_today;
            document.getElementById('week-clicks').textContent = stats.clicks_week;

            if (stats.recent_clicks.length === 0) {
                document.getElementById('clicks-empty').classList.remove('hidden');
                return;
            }

            document.getElementById('clicks-table').classList.remove('hidden');
            const tbody = document.getElementById('clicks-body');
            tbody.innerHTML = stats.recent_clicks.map(click => `
                <tr class="border-b border-gray-800 hover:bg-gray-800/50">
                    <td class="px-4 py-3 text-sm text-gray-300">${new Date(click.clicked_at).toLocaleString()}</td>
                    <td class="px-4 py-3 text-sm text-gray-400 font-mono">${click.ip_address || '-'}</td>
                    <td class="px-4 py-3 text-sm text-gray-400 max-w-xs truncate">${click.referer || 'Direct'}</td>
                    <td class="px-4 py-3 text-sm text-gray-400 max-w-xs truncate">${click.user_agent || '-'}</td>
                </tr>
            `).join('');
        } catch (e) {
            document.getElementById('stats-loading').textContent = 'Failed to load stats';
        }
    }
</script>
{% endblock %}
